# Wakeel — nginx reverse proxy.
# /api and /health → FastAPI backend; everything else → Next.js frontend.

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile      on;
    keepalive_timeout 65;
    client_max_body_size 20m;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               application/xml image/svg+xml;
    gzip_min_length 1024;

    # WebSocket upgrade support (Next.js HMR is dev-only, but the app also
    # exposes ws:// endpoints via NEXT_PUBLIC_WS_BASE_URL).
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ""      close;
    }

    upstream backend {
        server backend:8000;
    }

    upstream frontend {
        server frontend:3000;
    }

    server {
        listen 80;
        server_name _;

        # ── HTTPS redirect ────────────────────────────────────────
        # Uncomment once certificates are in deployment/nginx/certs/:
        # return 301 https://$host$request_uri;

        location /health {
            proxy_pass http://backend/health;
            proxy_set_header Host $host;
        }

        location /api/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade           $http_upgrade;
            proxy_set_header Connection        $connection_upgrade;
            proxy_read_timeout 120s;   # LLM answers can take a while
        }

        location / {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade           $http_upgrade;
            proxy_set_header Connection        $connection_upgrade;
        }
    }

    # ── HTTPS server ──────────────────────────────────────────────
    # Place fullchain.pem / privkey.pem in deployment/nginx/certs/
    # (e.g. from certbot) and uncomment:
    #
    # server {
    #     listen 443 ssl;
    #     server_name wakeel.example.com;
    #
    #     ssl_certificate     /etc/nginx/certs/fullchain.pem;
    #     ssl_certificate_key /etc/nginx/certs/privkey.pem;
    #     ssl_protocols       TLSv1.2 TLSv1.3;
    #
    #     location /health { proxy_pass http://backend/health; proxy_set_header Host $host; }
    #
    #     location /api/ {
    #         proxy_pass http://backend;
    #         proxy_http_version 1.1;
    #         proxy_set_header Host              $host;
    #         proxy_set_header X-Real-IP         $remote_addr;
    #         proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    #         proxy_set_header X-Forwarded-Proto $scheme;
    #         proxy_set_header Upgrade           $http_upgrade;
    #         proxy_set_header Connection        $connection_upgrade;
    #         proxy_read_timeout 120s;
    #     }
    #
    #     location / {
    #         proxy_pass http://frontend;
    #         proxy_http_version 1.1;
    #         proxy_set_header Host              $host;
    #         proxy_set_header X-Real-IP         $remote_addr;
    #         proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    #         proxy_set_header X-Forwarded-Proto $scheme;
    #         proxy_set_header Upgrade           $http_upgrade;
