# Wakeel — local development stack.
#
#   docker compose up -d --build          → core stack (backend, frontend, mini-rag, postgres, redis)
#   docker compose --profile erp up -d    → additionally start Odoo + its database
#
# Backend configuration (Supabase URLs, OpenAI key, JWT secret, …) comes from
# the root .env file — copy .env.example to .env first.

services:
  postgres:
    # pgvector build of Postgres 15 — same major version as before, so the
    # existing app_postgres_data volume keeps working, but CREATE EXTENSION
    # vector is now available for local RAG development.
    image: pgvector/pgvector:pg15
    environment:
      POSTGRES_DB: ${APP_POSTGRES_DB:-aerie_db}
      POSTGRES_USER: ${APP_POSTGRES_USER:-aerie_user}
      POSTGRES_PASSWORD: ${APP_POSTGRES_PASSWORD:-change-me}
    ports:
      - "5432:5432"
    volumes:
      - app_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${APP_POSTGRES_USER:-aerie_user} -d ${APP_POSTGRES_DB:-aerie_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mini-rag:
    build:
      context: ./MIni-RAG-APP-V1
    ports:
      - "8001:8001"
    env_file:
      - path: ./MIni-RAG-APP-V1/src/.env
        required: false
      - path: ./MIni-RAG-APP-V1/.env
        required: false
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import socket; socket.create_connection(('localhost', 8001), 3)\""]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      # Root context: the image needs the top-level agents/ and shared/ packages.
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - .env
    environment:
      # Inside the compose network the Mini-RAG service is reached by name,
      # overriding the localhost default from .env.
      MINI_RAG_BASE_URL: http://mini-rag:8001
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mini-rag:
        condition: service_healthy
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5)\""]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      target: dev
    environment:
      # The browser talks to the backend through its published host port.
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
      NEXT_PUBLIC_WS_BASE_URL: ws://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3000/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Optional ERP sandbox (docker compose --profile erp up) ─────
  odoo-db:
    image: postgres:15
    profiles: ["erp"]
    environment:
      POSTGRES_DB: ${ODOO_DB:-odoo}
      POSTGRES_USER: ${ODOO_DB_USER:-odoo}
      POSTGRES_PASSWORD: ${ODOO_DB_PASSWORD:-change-me}
    volumes:
      - odoo_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${ODOO_DB_USER:-odoo} -d ${ODOO_DB:-odoo}"]
      interval: 10s
      timeout: 5s
      retries: 5

  odoo:
    image: odoo:17
    profiles: ["erp"]
    depends_on:
      odoo-db:
        condition: service_healthy
    environment:
      HOST: odoo-db
      USER: ${ODOO_DB_USER:-odoo}
      PASSWORD: ${ODOO_DB_PASSWORD:-change-me}
    ports:
      - "8069:8069"
    volumes:
      - odoo_data:/var/lib/odoo
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8069/web/health', timeout=5)\""]
      interval: 15s
      timeout: 5s
      retries: 10

volumes:
  app_postgres_data:
  odoo_postgres_data:
  redis_data:
  odoo_data:

networks:
  default:
    name: aerie_network
