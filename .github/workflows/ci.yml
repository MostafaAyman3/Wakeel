name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt
      - name: Lint backend
        run: ruff check backend agents scripts tests
      - name: Test backend and agents
        run: pytest backend/tests agents/tests tests

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install
      - name: Typecheck frontend
        working-directory: frontend
        run: npx tsc --noEmit
      - name: Build frontend
        working-directory: frontend
        run: npm run build

